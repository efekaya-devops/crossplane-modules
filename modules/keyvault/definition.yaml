apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: keyvaults.platform.example.org
spec:
  group: platform.example.org
  scope: Cluster
  names:
    kind: KeyVault
    plural: keyvaults

  defaultCompositionRef:
    name: keyvaults.platform.example.org

  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - vaultName
                - resourceGroup
                - tenantId
                - team
              properties:
                vaultName:
                  type: string
                  pattern: "^[a-z0-9-]{3,24}$"
                resourceGroup:
                  type: string
                tenantId:
                  type: string
                  description: azure ad tenant id - usually the same one for every vault
                location:
                  type: string
                  default: westeurope
                skuName:
                  type: string
                  enum: [standard, premium]
                  default: standard
                team:
                  type: string
                environment:
                  type: string
                  enum: [dev, test, acc, prod]
                  default: dev
            status:
              type: object
              properties:
                vaultUri:
                  type: string

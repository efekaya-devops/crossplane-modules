apiVersion: apiextensions.crossplane.io/v2
kind: CompositeResourceDefinition
metadata:
  name: storageaccounts.platform.example.org
spec:
  group: platform.example.org
  scope: Cluster
  names:
    kind: StorageAccount
    plural: storageaccounts

  defaultCompositionRef:
    name: storageaccounts.platform.example.org

  versions:
    - name: v1alpha1
      served: true
      referenceable: true
      schema:
        openAPIV3Schema:
          type: object
          properties:
            spec:
              type: object
              required:
                - storageAccountName
                - resourceGroup
                - team
              properties:
                storageAccountName:
                  type: string
                  description: 3-24 lowercase alphanumeric, has to be globally unique
                  pattern: "^[a-z0-9]{3,24}$"
                resourceGroup:
                  type: string
                  description: existing resource group to deploy into
                location:
                  type: string
                  default: westeurope
                accountTier:
                  type: string
                  enum: [Standard, Premium]
                  default: Standard
                replicationType:
                  type: string
                  enum: [LRS, GRS, ZRS, RAGRS]
                  default: LRS
                team:
                  type: string
                environment:
                  type: string
                  enum: [dev, test, acc, prod]
                  default: dev
            status:
              type: object
              properties:
                primaryBlobEndpoint:
                  type: string
